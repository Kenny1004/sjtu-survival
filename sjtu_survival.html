<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>上海交通大学生存挑战</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --sjtu-red: #aa1f24; --sjtu-dark: #8b1a1e; --gold: #c9a84c;
    --bg: #0a0a12; --card: #13131f; --text: #e8e6e3; --dim: #8a8a9a;
  }
  body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
  .star { position: absolute; background: #fff; border-radius: 50%; animation: twinkle var(--dur) ease-in-out infinite alternate; }
  @keyframes twinkle { 0%{opacity:0.2} 100%{opacity:0.8} }
  .game-container { position: relative; z-index: 1; max-width: 820px; margin: 0 auto; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; }
  .status-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 12px; padding: 15px; background: var(--card); border-radius: 16px; border: 1px solid rgba(255,255,255,0.06); transition: all 0.5s; }
  .status-bar.hidden { display: none; }
  .stat { text-align: center; }
  .stat-label { font-size: 11px; color: var(--dim); margin-bottom: 4px; letter-spacing: 1px; }
  .stat-bar-bg { height: 8px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden; margin-top: 4px; }
  .stat-bar-fill { height: 100%; border-radius: 4px; transition: width 0.8s ease, background 0.5s; }
  .stat-value { font-size: 20px; font-weight: 700; }
  .stat-gpa .stat-bar-fill { background: linear-gradient(90deg, #f44, var(--gold), #4f4); }
  .stat-health .stat-bar-fill { background: linear-gradient(90deg, #f44, #fa4, #4f4); }
  .stat-social .stat-bar-fill { background: linear-gradient(90deg, #88f, #f4f); }
  .stat-mental .stat-bar-fill { background: linear-gradient(90deg, #f44, #4af, #4ff); }
  .stat-warn { animation: pulse 0.8s ease infinite alternate; }
  @keyframes pulse { from{opacity:1} to{opacity:0.4} }
  .class-badge { display: inline-block; background: rgba(170,31,36,0.25); border: 1px solid var(--sjtu-red); border-radius: 20px; padding: 2px 12px; font-size: 11px; color: var(--gold); margin-bottom: 8px; }
  .semester-indicator { text-align: center; margin-bottom: 12px; font-size: 13px; color: var(--gold); letter-spacing: 2px; }
  .semester-indicator.hidden { display: none; }
  .main-card { flex: 1; background: var(--card); border-radius: 20px; padding: 40px; border: 1px solid rgba(255,255,255,0.06); position: relative; overflow: hidden; animation: fadeIn 0.6s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .main-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg, var(--sjtu-red), var(--gold), var(--sjtu-red)); }
  .scene-icon { font-size: 64px; text-align: center; margin-bottom: 20px; filter: drop-shadow(0 0 20px rgba(170,31,36,0.3)); }
  .scene-title { font-size: 26px; font-weight: 900; text-align: center; margin-bottom: 12px; background: linear-gradient(135deg, #fff, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .scene-text { font-size: 15px; line-height: 1.9; color: #ccc; margin-bottom: 30px; text-align: center; max-width: 600px; margin-left: auto; margin-right: auto; }
  .choices { display: flex; flex-direction: column; gap: 12px; max-width: 560px; margin: 0 auto; }
  .choice-btn { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; padding: 16px 24px; color: var(--text); font-size: 15px; cursor: pointer; transition: all 0.3s; text-align: left; font-family: inherit; position: relative; overflow: hidden; }
  .choice-btn::before { content:''; position:absolute; top:0; left:-100%; width:100%; height:100%; background:linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); transition: left 0.5s; }
  .choice-btn:hover::before { left: 100%; }
  .choice-btn:hover { border-color: var(--sjtu-red); background: rgba(170,31,36,0.12); transform: translateX(6px); box-shadow: 0 0 25px rgba(170,31,36,0.15); }
  .choice-btn:active { transform: translateX(6px) scale(0.98); }
  .choice-emoji { margin-right: 10px; font-size: 18px; }
  .choice-hint { display: block; font-size: 11px; color: var(--dim); margin-top: 4px; padding-left: 28px; }
  .result-toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px 24px; font-size: 14px; z-index: 100; animation: toastIn 0.4s ease, toastOut 0.4s ease 2s forwards; box-shadow: 0 10px 40px rgba(0,0,0,0.5); white-space: nowrap; }
  @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-20px)} }
  @keyframes toastOut { to{opacity:0;transform:translateX(-50%) translateY(-20px)} }
  .result-positive { border-color: rgba(100,255,100,0.3); color: #8f8; }
  .result-negative { border-color: rgba(255,100,100,0.3); color: #f88; }
  .result-event { border-color: rgba(255,200,50,0.3); color: #fd8; }
  .title-screen .scene-icon { font-size: 80px; margin-top: 20px; }
  .title-screen .subtitle { color: var(--dim); font-size: 13px; text-align: center; margin-bottom: 20px; letter-spacing: 1px; }
  .start-btn, .class-select-btn { display: block; margin: 10px auto; background: linear-gradient(135deg, var(--sjtu-red), var(--sjtu-dark)); border: none; border-radius: 50px; padding: 16px 60px; color: #fff; font-size: 18px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.3s; box-shadow: 0 5px 30px rgba(170,31,36,0.4); }
  .start-btn:hover, .class-select-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 40px rgba(170,31,36,0.6); }

  /* 职业选择 */
  .class-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; max-width: 600px; margin: 20px auto; }
  .class-card { background: rgba(255,255,255,0.03); border: 2px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 20px; cursor: pointer; transition: all 0.3s; text-align: center; }
  .class-card:hover { border-color: var(--sjtu-red); background: rgba(170,31,36,0.1); transform: translateY(-4px); box-shadow: 0 8px 30px rgba(170,31,36,0.2); }
  .class-card.selected { border-color: var(--gold); background: rgba(201,168,76,0.1); box-shadow: 0 0 20px rgba(201,168,76,0.2); }
  .class-icon { font-size: 42px; margin-bottom: 8px; }
  .class-name { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .class-desc { font-size: 12px; color: var(--dim); margin-bottom: 10px; line-height: 1.5; }
  .class-stats { font-size: 11px; color: var(--gold); line-height: 1.6; }
  .class-passive { font-size: 11px; color: #8cf; margin-top: 6px; font-style: italic; }

  .ending-badge { width: 120px; height: 120px; margin: 0 auto 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 56px; border: 3px solid var(--gold); box-shadow: 0 0 40px rgba(201,168,76,0.3); }
  .ending-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-width: 400px; margin: 20px auto; font-size: 13px; color: var(--dim); }
  .ending-stats div { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 10px; text-align: center; }
  .ending-stats .es-val { font-size: 22px; font-weight: 700; color: var(--text); }
  .restart-btn { display: block; margin: 25px auto 0; background: transparent; border: 2px solid var(--sjtu-red); border-radius: 50px; padding: 12px 40px; color: var(--sjtu-red); font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.3s; }
  .restart-btn:hover { background: var(--sjtu-red); color: #fff; }
  .difficulty-tag { display: inline-block; padding: 2px 8px; border-radius: 8px; font-size: 10px; font-weight: 700; margin-left: 6px; vertical-align: middle; }
  .diff-easy { background: rgba(100,255,100,0.15); color: #8f8; }
  .diff-normal { background: rgba(255,200,50,0.15); color: #fd8; }
  .diff-hard { background: rgba(255,80,80,0.15); color: #f88; }
  .diff-hell { background: rgba(200,50,255,0.15); color: #f8f; }
  /* 任务系统 */
  .quest-toggle { position: fixed; bottom: 24px; right: 24px; z-index: 50; background: linear-gradient(135deg, #2a1a3e, #1a2a4e); border: 2px solid rgba(140,120,255,0.4); border-radius: 50%; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 20px rgba(100,80,200,0.3); font-family: inherit; color: #fff; }
  .quest-toggle:hover { transform: scale(1.1); box-shadow: 0 6px 30px rgba(100,80,200,0.5); }
  .quest-toggle.hidden { display: none; }
  .quest-toggle .quest-count { position: absolute; top: -4px; right: -4px; background: var(--sjtu-red); color: #fff; font-size: 11px; font-weight: 700; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .quest-panel { position: fixed; top: 0; right: -420px; width: 400px; max-width: 90vw; height: 100vh; background: #0e0e1a; border-left: 1px solid rgba(140,120,255,0.2); z-index: 200; transition: right 0.4s ease; overflow-y: auto; padding: 20px; }
  .quest-panel.open { right: 0; }
  .quest-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 199; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .quest-overlay.open { opacity: 1; pointer-events: auto; }
  .quest-panel-title { font-size: 20px; font-weight: 900; color: #fff; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; }
  .quest-panel-sub { font-size: 12px; color: var(--dim); margin-bottom: 16px; }
  .quest-close { background: none; border: none; color: var(--dim); font-size: 24px; cursor: pointer; padding: 4px 8px; }
  .quest-close:hover { color: #fff; }
  .quest-section-title { font-size: 13px; color: rgba(140,120,255,0.7); font-weight: 700; margin: 16px 0 8px; letter-spacing: 1px; border-bottom: 1px solid rgba(140,120,255,0.15); padding-bottom: 4px; }
  .quest-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 14px; margin-bottom: 10px; transition: all 0.3s; }
  .quest-card:hover { border-color: rgba(140,120,255,0.3); }
  .quest-card.active { border-color: rgba(140,120,255,0.5); background: rgba(140,120,255,0.06); }
  .quest-card.completed { border-color: rgba(100,255,100,0.4); background: rgba(100,255,100,0.05); }
  .quest-card.failed { border-color: rgba(255,80,80,0.3); background: rgba(255,80,80,0.04); opacity: 0.6; }
  .quest-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .quest-icon { font-size: 28px; }
  .quest-name { font-size: 15px; font-weight: 700; color: #fff; flex: 1; }
  .quest-status-tag { font-size: 10px; padding: 2px 8px; border-radius: 8px; font-weight: 700; }
  .qst-active { background: rgba(140,120,255,0.2); color: #a8a0ff; }
  .qst-done { background: rgba(100,255,100,0.2); color: #8f8; }
  .qst-fail { background: rgba(255,80,80,0.2); color: #f88; }
  .quest-desc { font-size: 12px; color: var(--dim); line-height: 1.6; margin-bottom: 8px; }
  .quest-reqs { font-size: 11px; color: #aaa; margin-bottom: 10px; }
  .quest-reqs span { display: inline-block; margin-right: 10px; padding: 1px 6px; border-radius: 4px; }
  .quest-reqs .req-met { background: rgba(100,255,100,0.1); color: #8f8; }
  .quest-reqs .req-unmet { background: rgba(255,80,80,0.1); color: #f88; }
  .quest-btn { background: rgba(140,120,255,0.15); border: 1px solid rgba(140,120,255,0.4); border-radius: 8px; padding: 6px 16px; color: #a8a0ff; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.3s; }
  .quest-btn:hover { background: rgba(140,120,255,0.3); }
  .quest-btn.abandon { background: rgba(255,80,80,0.1); border-color: rgba(255,80,80,0.3); color: #f88; }
  .quest-btn.abandon:hover { background: rgba(255,80,80,0.25); }
  .quest-reward { font-size: 11px; color: var(--gold); font-style: italic; margin-top: 4px; }
  .quest-ending-list { margin-top: 20px; }
  .quest-ending-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 12px; color: var(--dim); }
  .quest-ending-item .qe-icon { font-size: 18px; }

  @media (max-width: 600px) {
    .main-card { padding: 24px 18px; }
    .status-bar { grid-template-columns: repeat(2, 1fr); }
    .class-grid { grid-template-columns: 1fr; }
    .scene-title { font-size: 22px; }
    .scene-text { font-size: 14px; }
    .quest-panel { width: 100%; right: -100%; }
    .quest-toggle { bottom: 16px; right: 16px; width: 48px; height: 48px; font-size: 20px; }
  }
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<button class="quest-toggle hidden" id="questToggle" onclick="toggleQuestPanel()">📋<span class="quest-count" id="questCount" style="display:none">0</span></button>
<div class="quest-overlay" id="questOverlay" onclick="toggleQuestPanel()"></div>
<div class="quest-panel" id="questPanel"></div>
<div class="game-container">
  <div class="status-bar hidden" id="statusBar">
    <div class="stat stat-gpa"><div class="stat-label">📚 GPA</div><div class="stat-value" id="gpaVal">3.0</div><div class="stat-bar-bg"><div class="stat-bar-fill" id="gpaBar" style="width:75%"></div></div></div>
    <div class="stat stat-health"><div class="stat-label">💪 体力</div><div class="stat-value" id="healthVal">80</div><div class="stat-bar-bg"><div class="stat-bar-fill" id="healthBar" style="width:80%"></div></div></div>
    <div class="stat stat-social"><div class="stat-label">👥 社交</div><div class="stat-value" id="socialVal">60</div><div class="stat-bar-bg"><div class="stat-bar-fill" id="socialBar" style="width:60%"></div></div></div>
    <div class="stat stat-mental"><div class="stat-label">🧠 心理</div><div class="stat-value" id="mentalVal">70</div><div class="stat-bar-bg"><div class="stat-bar-fill" id="mentalBar" style="width:70%"></div></div></div>
  </div>
  <div class="semester-indicator hidden" id="semesterInd">第一学期</div>
  <div class="main-card" id="mainCard"></div>
</div>

<script>
// ==================== 职业定义 ====================
const CLASSES = {
  xueba: {
    icon: '🤓', name: '学霸', difficulty: 'normal', diffClass: 'diff-normal',
    desc: '从小到大的尖子生，学习是刻在DNA里的。但社交？不存在的。',
    gpa: 3.5, health: 55, social: 30, mental: 55,
    passive: '被动：考试前自动 GPA+0.1，但每学期社交-5',
    passiveFn(s) { s.gpa = Math.min(4, +(s.gpa + 0.1).toFixed(1)); s.social = Math.max(0, s.social - 5); },
  },
  sheniu: {
    icon: '🎤', name: '社牛', difficulty: 'normal', diffClass: 'diff-normal',
    desc: '天生的社交达人，走到哪儿都是焦点。但一个人坐下来学习？要命。',
    gpa: 2.5, health: 65, social: 85, mental: 60,
    passive: '被动：每学期社交+5，但GPA自动-0.1（太多局了）',
    passiveFn(s) { s.social = Math.min(100, s.social + 5); s.gpa = Math.max(0, +(s.gpa - 0.1).toFixed(1)); },
  },
  tiyu: {
    icon: '🏃', name: '体育特长生', difficulty: 'hard', diffClass: 'diff-hard',
    desc: '靠体育特招进交大。体能无敌，但高数是什么？能吃吗？',
    gpa: 2.0, health: 95, social: 55, mental: 60,
    passive: '被动：每学期体力+10，但GPA-0.1（基础太差）',
    passiveFn(s) { s.health = Math.min(100, s.health + 10); s.gpa = Math.max(0, +(s.gpa - 0.1).toFixed(1)); },
  },
  fuerdai: {
    icon: '💎', name: '富二代', difficulty: 'easy', diffClass: 'diff-easy',
    desc: '家里有矿，从小见过大世面。心态好、社交广，但容易摆烂。',
    gpa: 2.6, health: 70, social: 75, mental: 80,
    passive: '被动：每学期心理+5，但有30%概率摆烂GPA-0.2',
    passiveFn(s) { s.mental = Math.min(100, s.mental + 5); if (Math.random() < 0.3) s.gpa = Math.max(0, +(s.gpa - 0.2).toFixed(1)); },
  },
  juanwang: {
    icon: '📚', name: '卷王', difficulty: 'hard', diffClass: 'diff-hard',
    desc: '不卷会死星人。GPA就是生命，但身体和心理都在透支。',
    gpa: 3.8, health: 35, social: 25, mental: 35,
    passive: '被动：每学期GPA+0.1，但体力-8、心理-8',
    passiveFn(s) { s.gpa = Math.min(4, +(s.gpa + 0.1).toFixed(1)); s.health = Math.max(0, s.health - 8); s.mental = Math.max(0, s.mental - 8); },
  },
  putong: {
    icon: '😐', name: '小镇做题家', difficulty: 'hell', diffClass: 'diff-hell',
    desc: '从十八线小城考进交大，什么都要从头开始。没有背景，只有背影。',
    gpa: 2.8, health: 50, social: 20, mental: 40,
    passive: '被动：逆境成长——属性低于30时，该属性每学期+3',
    passiveFn(s) {
      if (s.health > 0 && s.health < 30) s.health = Math.min(100, s.health + 3);
      if (s.social > 0 && s.social < 30) s.social = Math.min(100, s.social + 3);
      if (s.mental > 0 && s.mental < 30) s.mental = Math.min(100, s.mental + 3);
    },
  },
};

// ==================== 随机事件 ====================
const RANDOM_EVENTS = [
  { text: '🦠 流感席卷宿舍楼，你也中招了', effect: { health: -15, mental: -5 }, toast: '流感来袭！体力-15 心理-5' },
  { text: '💻 笔记本电脑突然坏了，论文没存', effect: { mental: -20, gpa: -0.1 }, toast: '电脑罢工！心理-20 GPA-0.1' },
  { text: '🏆 意外获得了一个奖学金！', effect: { mental: 15, gpa: 0.1 }, toast: '奖学金！心理+15 GPA+0.1' },
  { text: '🌧️ 连续一个月阴雨天，心情阴郁', effect: { mental: -12 }, toast: '阴雨连绵 心理-12' },
  { text: '😤 和室友因为作息问题大吵一架', effect: { social: -15, mental: -10 }, toast: '室友矛盾！社交-15 心理-10' },
  { text: '📱 刷手机到凌晨三点停不下来', effect: { health: -10, gpa: -0.1, mental: -5 }, toast: '手机成瘾 体力-10 GPA-0.1' },
  { text: '🍜 发现了一家超好吃的校外小馆', effect: { mental: 10, social: 5, health: -5 }, toast: '美食治愈！心理+10' },
  { text: '📊 突然被通知需要补交一份作业', effect: { mental: -10, gpa: -0.1 }, toast: '补交作业！心理-10 GPA-0.1' },
  { text: '🎪 学校举办了超棒的文化节', effect: { social: 10, mental: 10, health: -5 }, toast: '文化节！社交+10 心理+10' },
  { text: '😰 选课系统崩溃，你没抢到想要的课', effect: { mental: -10, gpa: -0.1 }, toast: '选课失败 心理-10' },
  { text: '🏃 被强制要求参加体测', effect: { health: -10, mental: -5 }, toast: '体测来袭 体力-10' },
  { text: '💸 这个月生活费超支了', effect: { mental: -10, social: -5 }, toast: '钱包空了 心理-10' },
  { text: '🐱 在校园里撸到了一只超可爱的猫', effect: { mental: 12 }, toast: '猫猫治愈 心理+12' },
  { text: '📖 教授在课上点名回答问题，你答得很好', effect: { gpa: 0.1, mental: 5 }, toast: '课堂表现佳 GPA+0.1' },
  { text: '🤧 换季过敏，难受了一整周', effect: { health: -12, mental: -5 }, toast: '过敏季 体力-12' },
  { text: '👻 期中考发现复习的内容全没考', effect: { gpa: -0.2, mental: -15 }, toast: '考试翻车！GPA-0.2 心理-15' },
  { text: '🎉 老朋友来上海找你玩了一周末', effect: { social: 8, mental: 10, health: -5 }, toast: '朋友来访 心理+10' },

// ==================== 游戏状态 ====================
const state = { gpa: 3.0, health: 80, social: 60, mental: 70, semester: 1, scene: 'title', flags: {}, totalSemesters: 8, playerClass: null, activeQuests: [], completedQuests: [] };

function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function applyStat(changes) {
  if (changes.gpa !== undefined) state.gpa = clamp(+(state.gpa + changes.gpa).toFixed(1), 0, 4.0);
  if (changes.health !== undefined) state.health = clamp(state.health + changes.health, 0, 100);
  if (changes.social !== undefined) state.social = clamp(state.social + changes.social, 0, 100);
  if (changes.mental !== undefined) state.mental = clamp(state.mental + changes.mental, 0, 100);
  if (changes.flags) Object.assign(state.flags, changes.flags);
  updateUI();
}

function updateUI() {
  document.getElementById('gpaVal').textContent = state.gpa.toFixed(1);
  document.getElementById('healthVal').textContent = state.health;
  document.getElementById('socialVal').textContent = state.social;
  document.getElementById('mentalVal').textContent = state.mental;
  document.getElementById('gpaBar').style.width = (state.gpa / 4 * 100) + '%';
  document.getElementById('healthBar').style.width = state.health + '%';
  document.getElementById('socialBar').style.width = state.social + '%';
  document.getElementById('mentalBar').style.width = state.mental + '%';
  // 低属性警告
  ['gpa','health','social','mental'].forEach(k => {
    const el = document.getElementById(k + 'Val');
    const v = k === 'gpa' ? state.gpa : state[k];
    const threshold = k === 'gpa' ? 1.5 : 25;
    el.parentElement.classList.toggle('stat-warn', v <= threshold && v > 0);
  });
  const semNames = ['', '大一·秋', '大一·春', '大二·秋', '大二·春', '大三·秋', '大三·春', '大四·秋', '大四·春'];
  const classInfo = CLASSES[state.playerClass];
  const badge = classInfo ? `<span class="class-badge">${classInfo.icon} ${classInfo.name}</span> ` : '';
  document.getElementById('semesterInd').innerHTML = `${badge}⏳ ${semNames[state.semester] || '未知'} — 第 ${state.semester}/${state.totalSemesters} 学期`;
}

function showToast(text, type) {
  const t = document.createElement('div');
  t.className = 'result-toast ' + (type === 'positive' ? 'result-positive' : type === 'event' ? 'result-event' : 'result-negative');
  t.textContent = text;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

function showStatus(v) {
  document.getElementById('statusBar').classList.toggle('hidden', !v);
  document.getElementById('semesterInd').classList.toggle('hidden', !v);
  document.getElementById('questToggle').classList.toggle('hidden', !v);
  if (v) updateQuestCount();
}

// ==================== 任务面板 ====================
function toggleQuestPanel() {
  const panel = document.getElementById('questPanel');
  const overlay = document.getElementById('questOverlay');
  const isOpen = panel.classList.contains('open');
  panel.classList.toggle('open');
  overlay.classList.toggle('open');
  if (!isOpen) renderQuestPanel();
}

function updateQuestCount() {
  const cnt = state.activeQuests.length;
  const el = document.getElementById('questCount');
  el.textContent = cnt;
  el.style.display = cnt > 0 ? 'flex' : 'none';
}

function acceptQuest(id) {
  if (!state.activeQuests.includes(id) && !state.completedQuests.includes(id)) {
    state.activeQuests.push(id);
    showToast(`📋 接取任务：${QUESTS[id].name}`, 'event');
    updateQuestCount();
    renderQuestPanel();
  }
}

function abandonQuest(id) {
  state.activeQuests = state.activeQuests.filter(q => q !== id);
  showToast(`❌ 放弃任务：${QUESTS[id].name}`, 'negative');
  updateQuestCount();
  renderQuestPanel();
}

function checkQuests() {
  // 检查所有活跃任务的完成状态
  state.activeQuests.forEach(id => {
    const q = QUESTS[id];
    if (q.check(state) && !state.completedQuests.includes(id)) {
      state.completedQuests.push(id);
    }
  });
}

function renderQuestPanel() {
  const panel = document.getElementById('questPanel');
  const available = Object.entries(QUESTS).filter(([id, q]) =>
    state.semester >= q.unlockSemester && !state.activeQuests.includes(id) && !state.completedQuests.includes(id)
  );
  const active = state.activeQuests.map(id => [id, QUESTS[id]]);

  let html = `<div class="quest-panel-title">📋 毕业目标 <button class="quest-close" onclick="toggleQuestPanel()">✕</button></div>`;
  html += `<div class="quest-panel-sub">接取目标后，在毕业时满足条件即可解锁专属结局。可以同时追求多个目标。</div>`;

  // 进行中的任务
  if (active.length > 0) {
    html += `<div class="quest-section-title">🎯 当前目标（${active.length}）</div>`;
    active.forEach(([id, q]) => {
      const met = q.check(state);
      const reqs = q.reqText(state);
      html += `<div class="quest-card active">
        <div class="quest-header">
          <span class="quest-icon">${q.icon}</span>
          <span class="quest-name">${q.name}</span>
          <span class="quest-status-tag ${met ? 'qst-done' : 'qst-active'}">${met ? '✓ 已达成' : '进行中'}</span>
        </div>
        <div class="quest-desc">${q.desc}</div>
        <div class="quest-reqs">${reqs.map(r => `<span class="${r.met ? 'req-met' : 'req-unmet'}">${r.met ? '✓' : '✗'} ${r.label}</span>`).join('')}</div>
        <div class="quest-reward">🏆 ${q.reward}</div>
        <div style="margin-top:8px;"><button class="quest-btn abandon" onclick="abandonQuest('${id}')">放弃此目标</button></div>
      </div>`;
    });
  }

  // 可接取的任务
  if (available.length > 0) {
    html += `<div class="quest-section-title">📜 可接取的目标（${available.length}）</div>`;
    available.forEach(([id, q]) => {
      const reqs = q.reqText(state);
      html += `<div class="quest-card">
        <div class="quest-header">
          <span class="quest-icon">${q.icon}</span>
          <span class="quest-name">${q.name}</span>
        </div>
        <div class="quest-desc">${q.desc}</div>
        <div class="quest-reqs">${reqs.map(r => `<span class="${r.met ? 'req-met' : 'req-unmet'}">${r.met ? '✓' : '✗'} ${r.label}</span>`).join('')}</div>
        <div class="quest-reward">🏆 ${q.reward}</div>
        <div style="margin-top:8px;"><button class="quest-btn" onclick="acceptQuest('${id}')">接取此目标</button></div>
      </div>`;
    });
  }

  // 尚未解锁的任务
  const locked = Object.entries(QUESTS).filter(([id, q]) =>
    state.semester < q.unlockSemester && !state.activeQuests.includes(id)
  );
  if (locked.length > 0) {
    html += `<div class="quest-section-title">🔒 未解锁</div>`;
    locked.forEach(([id, q]) => {
      const semNames = ['', '大一·秋', '大一·春', '大二·秋', '大二·春', '大三·秋', '大三·春', '大四·秋', '大四·春'];
      html += `<div class="quest-card" style="opacity:0.4">
        <div class="quest-header">
          <span class="quest-icon">${q.icon}</span>
          <span class="quest-name">${q.name}</span>
          <span style="font-size:11px;color:var(--dim);">🔒 ${semNames[q.unlockSemester]}解锁</span>
        </div>
      </div>`;
    });
  }

  panel.innerHTML = html;
}

// 学期切换时触发
function onSemesterChange(newSem) {
  state.semester = newSem;
  // 学期衰减
  applyStat(SEMESTER_DECAY);
  // 职业被动
  const cls = CLASSES[state.playerClass];
  if (cls && cls.passiveFn) cls.passiveFn(state);
  // 随机事件(60%概率触发)
  if (Math.random() < 0.6) {
    const evt = RANDOM_EVENTS[Math.floor(Math.random() * RANDOM_EVENTS.length)];
    applyStat(evt.effect);
    setTimeout(() => showToast('⚡ ' + evt.toast, 'event'), 300);
  }
  // 检查是否有新任务可解锁
  const newlyAvailable = Object.entries(QUESTS).filter(([id, q]) =>
    q.unlockSemester === newSem && !state.activeQuests.includes(id) && !state.completedQuests.includes(id)
  );
  if (newlyAvailable.length > 0) {
    setTimeout(() => showToast(`📋 新目标解锁！点击右下角查看`, 'event'), 800);
  }
  // 检查已接任务的完成状态
  checkQuests();
  updateUI();
  updateQuestCount();
}

// ==================== 结局 ====================
function calculateEnding() {
  const { gpa, health, social, mental, flags, playerClass, completedQuests, activeQuests } = state;
  const total = health + social + mental;

  // 优先检查任务结局（取第一个完成的有结局的任务）
  for (const id of completedQuests) {
    const q = QUESTS[id];
    if (q && q.ending && activeQuests.includes(id)) return q.ending;
  }

  // 甜蜜毕业结局
  if (flags.togetherAfterGrad && gpa >= 3.0 && total >= 150) {
    return { icon: '💑', title: '双向奔赴 · 一起毕业', rank: 'S+',
      text: '毕业典礼结束后，你和恋人在思源湖边的长椅上坐了很久。\n\n四年前你们还是陌生人。\n四年后，你们手里都拿着学位证书，心里都装着彼此。\n\nTA说："接下来的路，一起走吧。"\n你说："本来就是。"\n\n后来你们去了同一座城市，租了一间小小的公寓。\n冰箱上贴着交大的冰箱贴，书架上放着毕业合照。\n\n这个结局，不比满绩点差。' };
  }
  // 毕业分手结局
  if (flags.gradBreakup && gpa >= 2.0) {
    return { icon: '🚶', title: '各奔前程', rank: 'A',
      text: '你拿到了学位证书。\n\n毕业典礼上，你在人群里看到了TA。\n你们目光交汇了一秒，然后都移开了。\n\n有些人陪你走过了最好的四年，但不会出现在之后的人生里。\n这不是遗憾，这是青春的一部分。\n\n多年后的某个深夜，你偶尔会想起思源湖边的夕阳。\n然后微笑着，继续过自己的日子。' };
  }
  // CS职业选手结局
  if (flags.csCareer) {
    if (mental >= 50 && social >= 40) {
      return { icon: '🔫', title: '电竞传奇 · 交大CS之光', rank: 'S+',
        text: '你走上了职业电竞的道路。\n\n虽然学业勉强毕业（或者延期了），但你在赛场上发光发热。\n第一年打二级联赛就帮助队伍升级，你的ID开始出现在各大赛事的击杀榜上。\n\n有人说你疯了，放着交大毕业生不当去打游戏。\n但当你举起奖杯的那一刻，你知道——这就是你的战场。\n\n"GG，WP。"\n\n交大电竞协会把你的照片挂在了活动室的墙上。\n下面写着："梦想不分赛道。"' };
    } else {
      return { icon: '😞', title: '未竟的电竞梦', rank: 'B',
        text: '你去试训了，但职业的残酷超出想象。\n每天14小时高强度训练，队内竞争激烈。\n\n几个月后，你被告知：实力还差一些。\n\n你回到学校，申请了延期毕业。\n虽然梦碎了，但你不后悔尝试。\n\n多年后你在直播CS时，偶尔会想起那段追梦的日子。\n弹幕飘过："主播当年差点打职业的吗？"\n\n你笑了笑，没有回答。' };
    }
  }
  if (gpa >= 3.8 && health >= 60 && social >= 60 && mental >= 60) {
    return { icon: '🏆', title: '完美毕业 · 人生赢家', rank: 'SSS',
      text: `作为${CLASSES[playerClass].name}，你以优异成绩毕业，获得"上海市优秀毕业生"称号。\n\nGPA名列前茅，身体健康，朋友遍天下，内心充实平静。\n\n毕业典礼上，你回望四年——每一个选择，都成就了今天的你。\n\n交大，永远是你的家。` };
  } else if (gpa >= 3.3 && total >= 180) {
    return { icon: '🎓', title: '优秀毕业生', rank: 'S',
      text: '你交出了一份优秀的答卷。\n四年有挣扎有迷茫，但你始终没有放弃。\n\n未来的路很长，你已经准备好了。' };
  } else if (gpa >= 2.8 && total >= 120) {
    return { icon: '😊', title: '顺利毕业', rank: 'A',
      text: '虽然不是最优秀的，但你用自己的方式走完了旅程。\n有遗憾也有收获。\n\n最重要的是——你毕业了。' };
  } else if (gpa >= 2.0) {
    return { icon: '😓', title: '险险毕业', rank: 'B',
      text: '最后一个学期险象环生。好几门差点挂科，论文是DDL前一天才完成。\n\n但是——你毕业了！\n这份韧性，比任何成绩都重要。' };
  } else {
    return { icon: '📜', title: '延期毕业', rank: 'C',
      text: '学分不够或GPA未达要求，需要延期一学期。\n\n这不是失败，只是多了一段旅程。\n很多成功的人都走过弯路。你没有放弃。' };
  }
}

// ==================== 渲染 ====================
function renderScene(sceneId) {
  if (state.gpa <= 0 && sceneId !== 'gameover_gpa') sceneId = 'gameover_gpa';
  else if (state.health <= 0 && sceneId !== 'gameover_health') sceneId = 'gameover_health';
  else if (state.mental <= 0 && sceneId !== 'gameover_mental') sceneId = 'gameover_mental';
  else if (state.social <= 0 && sceneId !== 'gameover_social') sceneId = 'gameover_social';

  state.scene = sceneId;
  const scene = scenes[sceneId];
  const card = document.getElementById('mainCard');
  card.style.animation = 'none'; card.offsetHeight; card.style.animation = 'fadeIn 0.6s ease';

  // 标题页
  if (sceneId === 'title') {
    showStatus(false);
    card.innerHTML = `<div class="title-screen">
      <div class="scene-icon">${scene.icon}</div>
      <div class="scene-title">${scene.title}</div>
      <div class="subtitle">一款关于选择与生存的文字冒险游戏</div>
      <div class="scene-text">${scene.text.replace(/\n/g,'<br>')}</div>
      <button class="start-btn" onclick="renderScene('classSelect')">📖 选择你的身份</button>
    </div>`;
    return;
  }

  // 职业选择页
  if (sceneId === 'classSelect') {
    showStatus(false);
    let grid = '<div class="class-grid">';
    for (const [id, c] of Object.entries(CLASSES)) {
      grid += `<div class="class-card" onclick="selectClass('${id}')" id="class_${id}">
        <div class="class-icon">${c.icon}</div>
        <div class="class-name">${c.name} <span class="difficulty-tag ${c.diffClass}">${c.difficulty}</span></div>
        <div class="class-desc">${c.desc}</div>
        <div class="class-stats">GPA ${c.gpa.toFixed(1)} | 体力 ${c.health} | 社交 ${c.social} | 心理 ${c.mental}</div>
        <div class="class-passive">${c.passive}</div>
      </div>`;
    }
    grid += '</div>';
    card.innerHTML = `
      <div class="scene-icon">${scene.icon}</div>
      <div class="scene-title">${scene.title}</div>
      <div class="scene-text">${scene.text.replace(/\n/g,'<br>')}</div>
      ${grid}
      <button class="start-btn" id="confirmClassBtn" style="opacity:0.3;pointer-events:none;margin-top:20px;" onclick="startGame()">确认选择</button>
    `;
    return;
  }

  // 结局
  if (sceneId === 'ending') {
    checkQuests();
    const e = calculateEnding();
    showStatus(true);
    // 生成任务完成列表
    let questHtml = '';
    if (state.activeQuests.length > 0) {
      questHtml += '<div class="quest-ending-list">';
      questHtml += '<div style="text-align:center;color:var(--dim);font-size:13px;font-weight:700;margin-bottom:8px;border-top:1px solid rgba(255,255,255,0.06);padding-top:12px;">📋 毕业目标达成</div>';
      state.activeQuests.forEach(id => {
        const q = QUESTS[id];
        const done = state.completedQuests.includes(id);
        questHtml += `<div class="quest-ending-item">
          <span class="qe-icon">${q.icon}</span>
          <span style="flex:1">${q.name}</span>
          <span style="font-weight:700;color:${done ? '#8f8' : '#f88'}">${done ? '✓ 达成' : '✗ 未达成'}</span>
        </div>`;
      });
      questHtml += '</div>';
    }
    card.innerHTML = `
      <div class="ending-badge">${e.icon}</div>
      <div class="scene-title">${e.title}</div>
      <div style="text-align:center;color:var(--gold);font-size:28px;font-weight:900;margin:10px 0;">评级：${e.rank}</div>
      <div class="scene-text">${e.text.replace(/\n/g,'<br>')}</div>
      <div class="ending-stats">
        <div><div class="es-val">${state.gpa.toFixed(1)}</div>最终 GPA</div>
        <div><div class="es-val">${state.health}</div>最终体力</div>
        <div><div class="es-val">${state.social}</div>最终社交</div>
        <div><div class="es-val">${state.mental}</div>最终心理</div>
      </div>
      ${questHtml}
      <div style="text-align:center;color:var(--dim);font-size:12px;margin-top:10px;">
        ${CLASSES[state.playerClass].icon} ${CLASSES[state.playerClass].name} · ${state.semester} 个学期
      </div>
      <button class="restart-btn" onclick="location.reload()">🔄 再来一次</button>`;
    return;
  }

  // 特殊结局（属性归零）
  if (scene.isEnding) {
    showStatus(true);
    card.innerHTML = `
      <div class="ending-badge">${scene.icon}</div>
      <div class="scene-title">${scene.title}</div>
      <div class="scene-text">${scene.text.replace(/\n/g,'<br>')}</div>
      <div class="ending-stats">
        <div><div class="es-val">${state.gpa.toFixed(1)}</div>最终 GPA</div>
        <div><div class="es-val">${state.health}</div>最终体力</div>
        <div><div class="es-val">${state.social}</div>最终社交</div>
        <div><div class="es-val">${state.mental}</div>最终心理</div>
      </div>
      <div style="text-align:center;color:var(--dim);font-size:12px;margin-top:10px;">
        ${CLASSES[state.playerClass].icon} ${CLASSES[state.playerClass].name} · 在第 ${state.semester} 学期倒下
      </div>
      <button class="restart-btn" onclick="location.reload()">🔄 再来一次</button>`;
    return;
  }

  // 普通场景
  showStatus(true);
  const text = typeof scene.text === 'function' ? scene.text() : scene.text;
  const choiceList = typeof scene.choices === 'function' ? scene.choices() : (scene.choices || []);
  let choicesHtml = '<div class="choices">';
  choiceList.forEach((c, i) => {
    choicesHtml += `<button class="choice-btn" onclick="choose(${i})" style="animation:fadeIn 0.4s ease ${0.1+i*0.1}s both;">
      <span class="choice-emoji">${(c.text.match(/^\S+/)||[''])[0]}</span>${c.text.replace(/^\S+\s*/,'')}
      ${c.hint ? `<span class="choice-hint">${c.hint}</span>` : ''}
    </button>`;
  });
  choicesHtml += '</div>';
  card.innerHTML = `
    <div class="scene-icon">${scene.icon}</div>
    <div class="scene-title">${scene.title}</div>
    <div class="scene-text">${text.replace(/\n/g,'<br>')}</div>
    ${choicesHtml}`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

let selectedClass = null;
function selectClass(id) {
  selectedClass = id;
  document.querySelectorAll('.class-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('class_' + id).classList.add('selected');
  const btn = document.getElementById('confirmClassBtn');
  btn.style.opacity = '1'; btn.style.pointerEvents = 'auto';
}

function startGame() {
  if (!selectedClass) return;
  const cls = CLASSES[selectedClass];
  state.playerClass = selectedClass;
  state.gpa = cls.gpa; state.health = cls.health; state.social = cls.social; state.mental = cls.mental;
  state.semester = 1; state.flags = {}; state.activeQuests = []; state.completedQuests = [];
  updateUI();
  renderScene('s1_intro');
}

function choose(index) {
  const scene = scenes[state.scene];
  const choiceList = typeof scene.choices === 'function' ? scene.choices() : scene.choices;
  const choice = choiceList[index];
  applyStat(choice.effect);
  if (choice.semester) onSemesterChange(choice.semester);
  // toast
  const ef = choice.effect;
  let parts = [];
  if (ef.gpa > 0) parts.push(`GPA+${ef.gpa}`); if (ef.gpa < 0) parts.push(`GPA${ef.gpa}`);
  if (ef.health > 0) parts.push(`体力+${ef.health}`); if (ef.health < 0) parts.push(`体力${ef.health}`);
  if (ef.social > 0) parts.push(`社交+${ef.social}`); if (ef.social < 0) parts.push(`社交${ef.social}`);
  if (ef.mental > 0) parts.push(`心理+${ef.mental}`); if (ef.mental < 0) parts.push(`心理${ef.mental}`);
  if (parts.length) {
    const pos = (ef.gpa > 0 || ef.health > 0 || ef.social > 0 || ef.mental > 0);
    const neg = (ef.gpa < 0 || ef.health < 0 || ef.social < 0 || ef.mental < 0);
    showToast(parts.join(' | '), pos && !neg ? 'positive' : 'negative');
  }
  setTimeout(() => renderScene(choice.next), 200);
}

// 星空
(function(){
  const c = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div'); s.className = 'star';
    const sz = Math.random()*2+1;
    s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${Math.random()*3+2}s;`;
    c.appendChild(s);
  }
})();

renderScene('title');
</script>
